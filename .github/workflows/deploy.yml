name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify APP_VERSION sync
        run: |
          v1=$(grep -oP "APP_VERSION = '\K[^']+" js/version.js)
          v2=$(grep -oP "APP_VERSION = '\K[^']+" sw.js)
          echo "version.js=$v1  sw.js=$v2"
          if [ "$v1" != "$v2" ]; then
            echo "::error::APP_VERSION mismatch — version.js ($v1) != sw.js ($v2)"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
